<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Anco AI</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
<style>
  html,body{height:100%;margin:0}
  body{background:#0A0A0A;color:#fff;font-family:'Montserrat',sans-serif;display:flex;align-items:center;justify-content:center;text-align:center}
  h1{font-weight:900;letter-spacing:-0.02em;font-size:34px}
  h1 span{background:linear-gradient(135deg,#06804E,#19C977);-webkit-background-clip:text;background-clip:text;color:transparent}
  p{color:#A1A1AA;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;font-size:12px;margin-top:14px}
</style>
</head>
<body>
  <div>
    <h1>ANCO <span>AI</span></h1>
    <p>Ops. Automation. Scale.</p>
  </div>
</body>
</html>
